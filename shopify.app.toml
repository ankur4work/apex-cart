# client_id = "REPLACE_WITH_YOUR_CLIENT_ID"
name = "Apex Cart"
# application_url = "REPLACE_WITH_YOUR_APP_URL"
embedded = true
# handle = "REPLACE_WITH_YOUR_APP_HANDLE"

[build]
automatically_update_urls_on_dev = false
# dev_store_url = "REPLACE_WITH_YOUR_DEV_STORE_URL"

[webhooks]
api_version = "2026-04"

  [webhooks.privacy_compliance]
  customer_deletion_url = "/api/webhooks"
  customer_data_request_url = "/api/webhooks"
  shop_deletion_url = "/api/webhooks"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
# redirect_urls = [ "REPLACE_WITH_YOUR_REDIRECT_URL" ]

[app_proxy]
# url = "REPLACE_WITH_YOUR_APP_PROXY_URL"
# subpath = "REPLACE_WITH_YOUR_SUBPATH"
prefix = "apps"

[pos]
embedded = false
